[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations first, then start the API server with 2 workers.
# DATABASE_URL is normalised to postgresql+asyncpg:// by config.py,
# so both alembic and uvicorn receive the correct async driver scheme.
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
