[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Migrations run as a pre-deploy step so they complete BEFORE the health-check
# window opens and before the web server starts. This decouples migration
# duration from healthcheckTimeout and prevents the container from being killed
# mid-migration (which rolls back the single Alembic transaction and produces a
# deploy retry loop).
# DATABASE_URL is normalised to postgresql+asyncpg:// by config.py, so alembic
# receives the correct async driver scheme.
#
# NOTE: no startCommand here on purpose. Railway executes a railway.toml
# startCommand in exec form (no shell), so a "$PORT" in it is passed literally
# to uvicorn ("Invalid value for '--port': '$PORT'"). Instead the Dockerfile's
# shell-form CMD launches the server and expands ${PORT} correctly.
preDeployCommand = "alembic upgrade head"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
