[pytest]
# AGRIOS backend test configuration.
# asyncio_mode=strict matches the existing suite (async tests carry explicit
# @pytest.mark.asyncio markers). Do not switch to auto without auditing markers.
asyncio_mode = strict
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
filterwarnings =
    ignore::PendingDeprecationWarning
    ignore::DeprecationWarning:passlib.*
