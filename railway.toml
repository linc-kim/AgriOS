# ─────────────────────────────────────────────────────────────────
# AGRIOS — Railway Deployment Configuration
# Backend: FastAPI + Uvicorn on Railway
# AD-07 (Frozen): Railway hosts the backend API
# ─────────────────────────────────────────────────────────────────

[build]
# Nixpacks auto-detects Python from requirements.txt.
# Override build command to install production deps only.
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
# Uvicorn with 2 workers in production.
# Workers = (2 × CPU cores) + 1 is recommended; Railway Starter has 1 vCPU.
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
# Railway hits this path after every deployment.
# Must return HTTP 200 within the timeout or the deploy is rolled back.
path = "/health"
timeoutSeconds = 30
intervalSeconds = 10
