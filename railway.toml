# ─────────────────────────────────────────────────────────────────
# AGRIOS — Root railway.toml
# NOTE: In Railway, set Root Directory = backend
# The canonical build + deploy config lives in backend/railway.toml.
# This file is kept at the repo root for reference only.
# ─────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# DATABASE_URL is normalised to postgresql+asyncpg:// by config.py.
# Migrations run before the server starts on every deploy.
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
