name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agrios
          POSTGRES_PASSWORD: agrios_test
          POSTGRES_DB: agrios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports
        continue-on-error: true  # Non-blocking in Sprint 0; enforce from Sprint 3

      - name: Run tests
        env:
          ENVIRONMENT: development
          DATABASE_URL: postgresql+asyncpg://agrios:agrios_test@localhost:5432/agrios_test
          SECRET_KEY: test_secret_key_32_chars_minimum
          JWT_SECRET: test_jwt_secret_64_chars_minimum_not_for_production_use
          AT_API_KEY: ""
          AT_USERNAME: ""
          AT_ENVIRONMENT: sandbox
          GEMINI_API_KEY: ""
          CLAUDE_API_KEY: ""
        run: pytest --cov=app --cov-report=term-missing -v

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.agrios.app/api/v1
          VITE_ENVIRONMENT: production
